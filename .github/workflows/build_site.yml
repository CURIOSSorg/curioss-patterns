name: Build and deploy patterns site
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patterns repo
        uses: actions/checkout@v6
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
          
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      
      - name: Build patterns site
        run: |
          cd .config
          mkdocs build --site-dir ../site
      
      - name: Deploy to curioss.org repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PATTERNS_DEPLOY_TOKEN }}
          external_repository: CURIOSSorg/curioss.org
          publish_dir: ./site
          destination_dir: static/patterns
          publish_branch: main
          keep_files: true  # Don't delete other files in the repo
